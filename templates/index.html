<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scared Opti Client</title>
    <style>
        :root { 
            --bg: #000; 
            --surface: #0a0a0a; 
            --border: #1a1a1a; 
            --text: #fff; 
            --muted: #666; 
            --accent: #fff; 
            --danger: #ff0000; 
            --success: #00ff00; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        .container { width: 100%; max-width: 400px; padding: 20px; }
        
        /* Login Screen */
        .login-box { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 40px; 
            text-align: center; 
        }
        
        h1 { font-size: 20px; font-weight: normal; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        
        input { 
            width: 100%; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 14px; 
            font-family: inherit; 
            font-size: 12px; 
            outline: none; 
            margin-bottom: 20px; 
            text-transform: uppercase; 
        }
        
        input:focus { border-color: var(--text); }
        
        button { 
            width: 100%; 
            background: var(--text); 
            color: var(--bg); 
            border: none; 
            padding: 14px; 
            font-family: inherit; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: opacity 0.2s; 
        }
        
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .error-msg { 
            color: var(--danger); 
            font-size: 11px; 
            margin-top: 15px; 
            min-height: 15px; 
            word-break: break-word; 
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }
        
        .tier-badge { 
            padding: 4px 10px; 
            border: 1px solid var(--text); 
            font-size: 10px; 
            text-transform: uppercase; 
        }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        
        .stat-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 20px; 
            text-align: center; 
        }
        
        .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        
        .logout-btn { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--muted); 
            margin-top: 20px; 
        }
        
        .logout-btn:hover { border-color: var(--danger); color: var(--danger); background: transparent; }
        
        /* Ban Overlay */
        .ban-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            flex-direction: column; 
            text-align: center; 
            padding: 40px; 
        }
        
        .ban-title { color: var(--danger); font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .ban-text { color: var(--muted); font-size: 12px; line-height: 1.6; margin-bottom: 30px; }
        .discord-link { 
            color: var(--text); 
            border: 1px solid var(--text); 
            padding: 12px 30px; 
            text-decoration: none; 
            font-size: 12px; 
            text-transform: uppercase; 
            transition: all 0.2s; 
        }
        .discord-link:hover { background: var(--text); color: var(--bg); }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="container" id="loginScreen">
        <div class="login-box">
            <h1>Scared Opti</h1>
            <input type="text" id="keyInput" placeholder="ENTER LICENSE KEY" autocomplete="off">
            <button id="activateBtn" onclick="activate()">Activate</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="container dashboard" id="dashboard">
        <div class="header">
            <div style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">System Status</div>
            <div class="tier-badge" id="userTier">BASIC</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">CPU Load</div>
                <div class="stat-value" id="cpuVal">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">RAM Usage</div>
                <div class="stat-value" id="ramVal">0%</div>
            </div>
        </div>
        
        <div style="background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px;">
            <div class="stat-label" style="margin-bottom: 10px;">Expires At</div>
            <div id="expiresDate" style="font-size: 14px;">--</div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout Session</button>
    </div>

    <!-- BAN OVERLAY -->
    <div class="ban-overlay" id="banOverlay">
        <div class="ban-title">⚠ Sharing Detected</div>
        <div class="ban-text">
            Your license key has been used on multiple devices or IP addresses.<br>
            Access has been permanently revoked.<br><br>
            If this is a mistake, contact support immediately.
        </div>
        <a href="https://discord.gg/yvZwbty5Fu" target="_blank" class="discord-link">Contact Support in Discord</a>
    </div>

    <script>
        // Конфигурация
        const API_URL = "https://scaredopti-api.onrender.com/"; // Замени на свой URL после деплоя
        
        // Проверка сохраненной сессии при загрузке
        window.onload = () => {
            const savedKey = localStorage.getItem('scared_key');
            const savedHwid = localStorage.getItem('scared_hwid');
            
            if (savedKey && savedHwid) {
                checkSession(savedKey, savedHwid);
            }
        };

        async function activate() {
            const key = document.getElementById('keyInput').value.trim();
            const btn = document.getElementById('activateBtn');
            const err = document.getElementById('errorMsg');
            
            if (!key) return;
            
            btn.disabled = true;
            btn.textContent = "VERIFYING...";
            err.textContent = "";
            
            try {
                // Генерируем простой HWID (в реальном проекте используй библиотеку)
                const hwid = await getHWID(); 
                
                const res = await fetch(`${API_URL}/activate`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ key, hwid })
                });
                
                const data = await res.json();
                
                if (data.status === 'ok') {
                    localStorage.setItem('scared_key', key);
                    localStorage.setItem('scared_hwid', hwid);
                    showDashboard(data);
                } else if (data.status === 'banned') {
                    showBanScreen();
                } else {
                    err.textContent = data.message || "INVALID KEY";
                }
            } catch (e) {
                err.textContent = "SERVER CONNECTION ERROR";
            } finally {
                btn.disabled = false;
                btn.textContent = "ACTIVATE";
            }
        }

        async function checkSession(key, hwid) {
            try {
                const res = await fetch(`${API_URL}/activate`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ key, hwid })
                });
                const data = await res.json();
                
                if (data.status === 'ok') showDashboard(data);
                else if (data.status === 'banned') showBanScreen();
                else logout();
            } catch {
                // Если сервер недоступен, показываем дашборд оффлайн (опционально)
                showDashboard({ tier: "OFFLINE", expires_at: 0 });
            }
        }

        function showDashboard(data) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userTier').textContent = data.tier;
            
            if (data.expires_at && data.expires_at > 0) {
                const date = new Date(data.expires_at * 1000);
                document.getElementById('expiresDate').textContent = date.toLocaleDateString();
            } else {
                document.getElementById('expiresDate').textContent = "PERMANENT";
            }
            
            startMetrics();
        }

        function showBanScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('banOverlay').style.display = 'flex';
            localStorage.removeItem('scared_key');
            localStorage.removeItem('scared_hwid');
        }

        function logout() {
            localStorage.removeItem('scared_key');
            localStorage.removeItem('scared_hwid');
            location.reload();
        }

        // Имитация метрик (замени на реальные данные из pywebview/api)
        function startMetrics() {
            setInterval(() => {
                document.getElementById('cpuVal').textContent = Math.floor(Math.random() * 30 + 10) + "%";
                document.getElementById('ramVal').textContent = Math.floor(Math.random() * 20 + 40) + "%";
            }, 2000);
        }

        // Простая генерация HWID
        async function getHWID() {
            // В продакшене используй нативный модуль для получения реального HWID
            let hwid = localStorage.getItem('local_hwid');
            if (!hwid) {
                hwid = 'HWID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('local_hwid', hwid);
            }
            return hwid;
        }
    </script>
</body>
</html>
